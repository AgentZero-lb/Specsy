name: Refresh catalog

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  scrape:
    name: Refresh ${{ matrix.shop }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # PCandParts serves an anti-bot HTML page to GitHub-hosted runners.
        # Refresh it manually from a trusted network or a Render cron job.
        shop: [macrotronics, ayoub]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-scraper.txt

      - run: pip install -r requirements-scraper.txt

      - name: Scrape and save
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scraper.runner ${{ matrix.shop }} --save
